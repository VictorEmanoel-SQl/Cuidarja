# URL de conexão apontando para o seu MySQL e para o banco de dados 'cuidarja'
spring.datasource.url=jdbc:mysql://localhost:3306/cuidarja?createDatabaseIfNotExist=true&serverTimezone=UTC

# Usuário padrão do MySQL
spring.datasource.username=root

# Coloque a SUA senha do MySQL no lugar de 'sua_senha_aqui'
spring.datasource.password=1234

# Configurações para o Hibernate criar e atualizar as tabelas do banco automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
