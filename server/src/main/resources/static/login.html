<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="light dark">
<title>Login/Cadastro</title>

<style>
:root {
  /*------------------------------CORES-PRINCIPAIS------------------------------*/
  color-scheme: light dark;
  --cor-da-secao: light-dark(#faf2f2, #1C1C1E);
  --cor-dos-titulos: light-dark(#4a4a4a, #F2F2F7);
  --preto: black;
  --branco: white;
  --texto: light-dark(#555, #F2F2F2);
  /*------------------------------HEADER------------------------------*/
  --cor-do-cabecalho: #66d7eb;
  --sombra-do-cabecalho: rgba(0,0,0,0.18);
  --sobreposicao: rgba(0,0,0,0.3);
  --sombra-do-puxador: rgba(0,0,0,0.22);
  --cor-botao-navegacao-principal: #ffffffaa;
  
  /*------------------------------PAGINACAO------------------------------*/
  --sombra-da-paginacao: rgba(0,0,0,0.3);
  --cor-dos-circulos: #bbb;
  
  /*------------------------------TAMANHOS------------------------------*/
  --tamanho-puxador: clamp(3.8rem, 20.8vw, 6rem);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: var(--altura-fixa, 100vh);
  overflow: hidden;
  font-family: sans-serif;
  font-size: 16px;
  position: relative;
}

main {
  display: flex;
  height: 100%;
  transition: transform 0.5s ease-out;
  position: relative;
  z-index: 1;
}

section {
  flex: 0 0 100%;
  width: 100vw;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--cor-da-secao);
}

header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: calc(var(--altura-fixa, 100vh) * 0.7);
  background: var(--cor-do-cabecalho);
  z-index: 10;
  transform: translateY(calc(var(--altura-fixa, 100vh) * -0.6));
  transition: transform 0.6s ease;
  padding: clamp(1rem, calc(var(--altura-fixa, 100vh) * 0.028), 2.5rem);
  box-shadow: 0 0.4rem 0.8rem var(--sombra-do-cabecalho);
  will-change: transform;
}

.navegacao-principal {
  display: flex;
  flex-direction: column;
  gap: clamp(0.5rem, calc(var(--altura-fixa, 100vh) * 0.0186), 1.5rem);
  margin-top: clamp(1rem, calc(var(--altura-fixa, 100vh) * 0.03), 3rem);
}

.link-menu {
  display: block;
  text-align: center;
  padding: clamp(0.5rem, calc(var(--altura-fixa, 100vh) * 0.015), 1.2rem);
  border: none;
  border-radius: 4rem;
  background: var(--cor-botao-navegacao-principal);
  box-shadow: inset 0 -1px 1px var(--preto), inset 0 1px 1px var(--branco);
  color: var(--preto);
  font-weight: bold;
  text-decoration: none;
  text-shadow: 0.1px 0.1px 1px var(--preto);
  outline: none;
  font-size: clamp(0.85rem, 4.16vw, 1.4rem);
}

.link-menu:active,
button:active, 
.botao-submeter-autenticacao:active {
  transform: scale(0.95);
  transition: transform 0.25s;
  box-shadow: inset 0 -2px 2px var(--preto), inset 0 2px 2px var(--branco);
  border: 0.1px gray solid;
  opacity: 0.95;
}

.puxador {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  background: var(--cor-do-cabecalho);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 11;
  width: var(--tamanho-puxador);
  aspect-ratio: 1;
  bottom: calc(var(--tamanho-puxador) / -2);
  font-size: calc(var(--tamanho-puxador) * 0.4);
}

.puxador::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow: 0 0.4rem 0.8rem var(--sombra-do-puxador);
  z-index: -1;
  clip-path: polygon(-100% 50%, 200% 50%, 200% 200%, -100% 200%);
}

.puxador::after {
  content: "\25BC";
  color: var(--branco);
  position: relative;
}

.sobreposicao {
  position: absolute;
  inset: 0;
  background: var(--sobreposicao);
  opacity: 0;
  pointer-events: none;
  transition: .9s;
  z-index: 5;
}

.sobreposicao.ativa {
  opacity: 1;
  pointer-events: all;
}

.paginacao {
  position: absolute;
  bottom: clamp(1rem, calc(var(--altura-fixa, 100vh) * 0.04), 2.5rem);
  width: 100%;
  display: flex;
  justify-content: center;
  gap: clamp(0.5rem, 1.5vw, 0.8rem);
  z-index: 2;
}

.paginacao span {
  width: clamp(0.5rem, 3.6vw, 1rem);
  aspect-ratio: 1;
  border-radius: 50%;
  background: var(--cor-dos-circulos);
  transition: all 0.4s ease;
}

.paginacao .ativo {
  background: var(--branco);
  width: clamp(0.65rem, 3.75vw, 1.2rem);
  box-shadow: 0px 0px 3px var(--sombra-da-paginacao);
}

h1 {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--branco);
  text-shadow: 0.1rem 0.1rem 0.1rem var(--preto);
  font-size: clamp(2.2rem, 12.5vw, 4.5rem);
}

/*------------------------------MÓDULO: AUTENTICAÇÃO------------------------------*/
.container-formulario-autenticacao {
  width: 85%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  margin-top: 2vh;
}

.titulo-autenticacao {
  font-size: clamp(2.8rem, 12vw, 4rem);
  color: var(--cor-dos-titulos);
  margin-bottom: 0.5rem;
  font-weight: bold;
}

.grupo-campo-autenticacao {
  width: 100%;
  position: relative;
}

.grupo-campo-autenticacao input {
  width: 100%;
  padding: 1.1rem 1.6rem;
  font-size: 1.2rem;
  font-style: italic;
  color: var(--texto);
  background-color: light-dark(rgba(255,255,255,0.4), rgba(255,255,255,0.05));
  border: 1px solid light-dark(#e0d5d5, #444);
  border-radius: 50px;
  outline: none;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
  user-select: text !important;
  -webkit-user-select: text !important;
}

.grupo-campo-autenticacao input.input-senha {
  padding-right: 3.8rem;
}

.grupo-campo-autenticacao input::placeholder {
  color: #999;
}

.botao-mostrar-senha {
  position: absolute;
  right: 1.4rem;
  top: 50%;
  transform: translateY(-50%);
  background: none !important;
  border: none !important;
  box-shadow: none !important;
  cursor: pointer;
  padding: 0;
  z-index: 12;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: none !important;
}

.grupo-campo-autenticacao .botao-mostrar-senha:active {
  transform: translateY(-50%) scale(1) !important;
  border: none !important;
  box-shadow: none !important;
  opacity: 0.6 !important;
}

.botao-mostrar-senha::before {
  content: "\29BF";
  font-size: 1.35rem;
  display: block;
  line-height: 1;
}

.botao-mostrar-senha.oculto::after {
  content: "";
  position: absolute;
  width: 80%;
  height: 2px;
  background-color: var(--texto);
  transform: rotate(-45deg);
  box-shadow: 0 0 1px var(--cor-da-secao);
}

.links-suporte-autenticacao {
  text-align: center;
  font-size: 1.1rem;
  font-weight: bold;
  font-style: italic;
  color: var(--texto);
  line-height: 1.5;
  margin-top: 0.2rem;
}

.links-suporte-autenticacao a {
  color: #4da6ff;
  text-decoration: underline;
}

.botao-submeter-autenticacao {
  width: 55%;
  padding: 0.9rem;
  margin-top: 0.8rem;
  border: none;
  border-radius: 50px;
  background-color: var(--cor-do-cabecalho);
  color: var(--branco);
  font-size: 1.3rem;
  font-weight: bold;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="sobreposicao" id="sobreposicao"></div>

<header id="cabecalho">
  <h1>CuidarJá</h1>
  <nav class="navegacao-principal" aria-label="Menu Principal">
    <a href="/" class="link-menu" draggable="false">Voltar para Home</a>
    <a href="/configuracoes" data-link class="link-menu" draggable="false">configurações</a>
    <a href="/perfil-hospitalar" data-link class="link-menu" draggable="false">perfil hospitalar</a>
    <a href="/loja" data-link class="link-menu" draggable="false">loja</a>
    <a href="/agradecimentos" data-link class="link-menu" draggable="false">agradecimentos</a>
  </nav>
  <div class="puxador"></div>
</header>

<main id="telas">
  <section>
    <form class="container-formulario-autenticacao" data-tipo-form="login">
      <h2 class="titulo-autenticacao">Login</h2>
      <div class="grupo-campo-autenticacao">
        <input type="email" class="input-email" placeholder="E-mail" autocomplete="email" required>
      </div>
      <div class="grupo-campo-autenticacao">
        <input type="password" placeholder="Senha" class="input-senha" required>
        <button type="button" class="botao-mostrar-senha oculto" aria-label="Mostrar senha"></button>
      </div>
      <p class="links-suporte-autenticacao">Esqueceu a senha?<br><a href="#" draggable="false">Suporte</a></p>
      <button type="submit" class="botao-submeter-autenticacao">ENVIAR</button>
    </form>
  </section>
  
  <section>
    <form class="container-formulario-autenticacao" data-tipo-form="cadastro">
      <h2 class="titulo-autenticacao">Cadastro</h2>
      <div class="grupo-campo-autenticacao">
        <input type="text" class="input-nome" placeholder="Nome Completo" required>
      </div>
      <div class="grupo-campo-autenticacao">
        <input type="email" class="input-email" placeholder="E-mail" required>
      </div>
      <div class="grupo-campo-autenticacao">
        <input type="password" placeholder="Criar Senha" class="input-senha" required>
        <button type="button" class="botao-mostrar-senha oculto" aria-label="Mostrar senha"></button>
      </div>
      <button type="submit" class="botao-submeter-autenticacao">CADASTRAR</button>
    </form>
  </section>
</main>

<div class="paginacao" id="paginacao" aria-hidden="true">
  <span class="ativo"></span>
  <span></span>
</div>

<script src="login.js"></script>
</body>
</html>
